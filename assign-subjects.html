<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS – Assign Subjects</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,Roboto,sans-serif}
body{background:#f8fafc;color:#1e293b;line-height:1.6}
.main-panel{flex:1;padding:40px 32px;background:#f8fafc;min-height:calc(100vh-70px)}
.page-header,.card{background:white;border-radius:16px;box-shadow:0 4px 25px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.page-header{padding:40px 36px;margin-bottom:32px}
.page-header h1{font-size:28px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.page-header p{font-size:16px;color:#475569}
.card{padding:40px;margin-bottom:28px}
.card-title{font-size:19px;font-weight:700;color:#1e293b;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #e5e7eb;display:flex;align-items:center;gap:12px}
.card-title i{color:#2563eb;font-size:22px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:14.5px;font-weight:600;color:#334155;display:flex;align-items:center;gap:8px}
.req{color:#ef4444;margin-left:3px}
.form-control{padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15.2px;color:#1e293b;transition:all .25s;background:white;width:100%}
.form-control:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
.form-control:disabled{background:#f8fafc;color:#64748b;cursor:not-allowed}
select.form-control{cursor:pointer}
.subjects-section{background:#f8fafc;border-radius:16px;padding:28px;margin:30px 0}
.subjects-section h3{font-size:19px;font-weight:700;color:#1e293b;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.subject-row{display:grid;grid-template-columns:1fr 1fr auto;gap:16px;align-items:end;background:white;padding:18px;border-radius:12px;border:1.5px solid #e2e8f0;margin-bottom:14px}
.btn-remove{background:#fee2e2;color:#ef4444;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:18px}
.btn-remove:hover{background:#fecaca;transform:scale(1.08)}
.btn-add{background:#f8fafc;color:#334155;border:2px dashed #94a3b8;padding:16px;border-radius:12px;width:100%;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px;font-size:15.5px;margin-top:8px}
.btn-add:hover{background:#f1f5f9;border-color:#3b82f6}
.btn-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:40px;padding-top:28px;border-top:1px solid #e5e7eb}
.btn{padding:13px 28px;border:none;border-radius:10px;font-size:15.5px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:9px;text-decoration:none}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.3)}
.btn-secondary{background:#f8fafc;color:#334155;border:1.5px solid #e2e8f0}
.btn-secondary:hover{background:#f1f5f9;border-color:#cbd5e1}
@media(max-width:768px){.main-panel,.page-header,.card{padding:24px 20px}
.form-grid,.subject-row{grid-template-columns:1fr}
.subject-row{gap:12px}}
</style>
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<main class="main-panel">
  <div class="page-header">
    <h1><i class="fas fa-layer-group" style="color:#2563eb;"></i> Assign Subjects</h1>
    <p>Manage and assign subjects & teachers to specific classes</p>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fas fa-chalkboard"></i> Class Information
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label><i class="fas fa-chalkboard-teacher"></i> Class Name <span class="req">*</span></label>
        <select class="form-control" id="classSelect" required onchange="fillClassDetails()">
          <option value="">-- Select Class --</option>
          <option value="Class A">Class A</option>
          <option value="Class B">Class B</option>
          <option value="Class C">Class C</option>
        </select>
      </div>
      <div class="form-group">
        <label><i class="fas fa-id-card"></i> Class ID</label>
        <input type="text" class="form-control" id="s_classId" disabled placeholder="Auto-generated">
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> Session</label>
        <input type="text" class="form-control" id="s_session" disabled placeholder="Session">
      </div>
      <div class="form-group">
        <label><i class="fas fa-layer-group"></i> Grade</label>
        <input type="text" class="form-control" id="s_grade" disabled placeholder="Grade">
      </div>
      <div class="form-group">
        <label><i class="fas fa-tags"></i> Section</label>
        <input type="text" class="form-control" id="s_section" disabled placeholder="Section">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fas fa-book-open"></i> Subject & Teacher Assignment
    </div>
    
    <form id="addSubjectsForm">
      <div class="subjects-section">
        <h3><i class="fas fa-book-open"></i> Subjects to Assign</h3>
        <div id="subjectsContainer"></div>
        <button type="button" class="btn-add" id="addSubjectBtn">
          <i class="fas fa-plus"></i> Add Another Subject
        </button>
      </div>

      <div class="btn-actions">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Assign Subjects</button>
        <button type="button" class="btn btn-secondary" id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
        <a href="#" class="btn btn-secondary" id="viewAssignedBtn"><i class="fas fa-eye"></i> View All Assigned Subjects</a>
        <a href="#" class="btn btn-secondary" id="backDashboardBtn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      </div>
    </form>
  </div>
</main>
<script src="components.js"></script>
<script>
    // Load Header and Sidebar
    function loadComponents() {
      // Load Header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    // Initialize everything after components are loaded
    window.onload = function() {
      loadComponents();
      
      // Give time for HTML to load then initialize JS
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };
// Class Data
const classData = {
  "Class A": {
    classId: "CA-2026-001",
    session: "2025-2026",
    grade: "Grade 5",
    section: "A"
  },
  "Class B": {
    classId: "CB-2026-002",
    session: "2025-2026",
    grade: "Grade 6",
    section: "B"
  },
  "Class C": {
    classId: "CC-2026-003",
    session: "2025-2026",
    grade: "Grade 7",
    section: "C"
  }
};

// Auto-fill Class Details
function fillClassDetails() {
  const className = document.getElementById('classSelect').value;
  const classIdField = document.getElementById('s_classId');
  const sessionField = document.getElementById('s_session');
  const gradeField = document.getElementById('s_grade');
  const sectionField = document.getElementById('s_section');

  if (classData[className]) {
    classIdField.value = classData[className].classId;
    sessionField.value = classData[className].session;
    gradeField.value = classData[className].grade;
    sectionField.value = classData[className].section;
  } else {
    classIdField.value = "";
    sessionField.value = "";
    gradeField.value = "";
    sectionField.value = "";
  }
}

const teacherOptions=`<option value="">-- Select Teacher --</option>
<option value="Teacher 1">Teacher 1</option><option value="Teacher 2">Teacher 2</option>
<option value="Teacher 3">Teacher 3</option><option value="Teacher 4">Teacher 4</option>
<option value="Teacher 5">Teacher 5</option><option value="Teacher 6">Teacher 6</option>
<option value="Teacher 7">Teacher 7</option><option value="Teacher 8">Teacher 8</option>
<option value="Teacher 9">Teacher 9</option><option value="Teacher 10">Teacher 10</option>`;

function getSubjectRowTemplate(){
  return `<div class="subject-row">
    <div class="form-group" style="margin-bottom:0">
      <label><i class="fas fa-book-open"></i> Subject Name <span class="req">*</span></label>
      <input type="text" class="form-control subject-name" placeholder="e.g. Mathematics, Physics, English" required>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label><i class="fas fa-user-tie"></i> Assigned Teacher <span class="req">*</span></label>
      <select class="form-control teacher-name" required>${teacherOptions}</select>
    </div>
    <button type="button" class="btn-remove" onclick="removeSubjectRow(this)"><i class="fas fa-times"></i></button>
  </div>`;
}

const subjectsContainer=document.getElementById('subjectsContainer');

function addSubjectRow(){
  subjectsContainer.insertAdjacentHTML('beforeend',getSubjectRowTemplate());
}

function removeSubjectRow(btn){
  if(subjectsContainer.children.length>1){
    btn.closest('.subject-row').remove();
  } else {
    alert("At least one subject is required!");
  }
}

// Initialize one subject row
subjectsContainer.innerHTML='';
addSubjectRow();

document.getElementById('addSubjectBtn').addEventListener('click',addSubjectRow);

document.getElementById('addSubjectsForm').addEventListener('submit',e=>e.preventDefault());

window.removeSubjectRow=removeSubjectRow;

</script>
</body>
</html>
