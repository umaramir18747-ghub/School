<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EHS – Make-Up Class</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="components.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,Roboto,sans-serif}
    body{background:#f8fafc;color:#1e293b;line-height:1.6}
    .main-panel{flex:1;padding:40px 32px;background:#f8fafc;min-height:calc(100vh-70px)}
    .page-header{background:white;border-radius:16px;padding:40px 36px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid #f1f5f9;margin-bottom:32px}
    .page-header h1{font-size:28px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:12px}
    .page-header p{font-size:16px;color:#475569}
    .card{background:white;border-radius:16px;padding:40px;box-shadow:0 4px 25px rgba(0,0,0,.07);border:1px solid #f1f5f9;margin-bottom:28px}
    .card-title{font-size:19px;font-weight:700;color:#1e293b;margin-bottom:28px;display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #e5e7eb}
    .card-title i{color:#2563eb;font-size:22px}
    
    .form-grid-2cols{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:24px}
    .form-grid-3cols{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:24px}
    .form-grid-full{display:grid;grid-template-columns:1fr;gap:24px}
    
    .form-group{display:flex;flex-direction:column;gap:8px}
    .form-group label{font-size:14.5px;font-weight:600;color:#334155;display:flex;align-items:center;gap:8px}
    .req{color:#ef4444;margin-left:3px}
    
    .form-control{padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15.2px;color:#1e293b;transition:all .25s ease;background:white;width:100%}
    .form-control:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    .form-control:disabled,.form-control[readonly]{background:#f8fafc;color:#64748b;cursor:not-allowed}
    textarea.form-control{resize:vertical;min-height:120px}
    select.form-control{cursor:pointer}
    
    /* Auto ID Preview */
    .class-id-preview{background:#f0f9ff;border-radius:10px;padding:12px 16px;margin-top:8px;border-left:4px solid #2563eb;font-size:13px;color:#1e40af;display:none}
    .class-id-preview.show{display:block}
    .class-id-preview i{margin-right:8px}
    
    .btn-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:40px;padding-top:28px;border-top:1px solid #e5e7eb}
    .btn{padding:13px 28px;border:none;border-radius:10px;font-size:15.5px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:9px;text-decoration:none}
    .btn-primary{background:#2563eb;color:white}
    .btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.3)}
    .btn-secondary{background:#f8fafc;color:#334155;border:1.5px solid #e2e8f0}
    .btn-secondary:hover{background:#f1f5f9;border-color:#cbd5e1}
    
    @media (max-width:768px){
      .main-panel{padding:24px 20px}
      .page-header,.card{padding:28px 24px}
      .form-grid-2cols,.form-grid-3cols{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<main class="main-panel">
  <div class="page-header">
    <h1><i class="fas fa-calendar-plus"></i> Make-Up Class</h1>
    <p>Schedule a make-up class by providing class details and description</p>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fas fa-chalkboard"></i> Make-Up Class Information
    </div>
    
    <div>
      <div class="form-grid-2cols">
        <div class="form-group">
          <label><i class="fas fa-school"></i> Make-Up Class Name <span class="req">*</span></label>
          <input type="text" class="form-control" id="className" placeholder="e.g., Mathematics Make-Up, Physics Revision Class">
        </div>

        <div class="form-group">
          <label><i class="fas fa-id-card"></i> Class ID <span class="req">*</span></label>
          <input type="text" class="form-control" id="classId" placeholder="Auto-generated based on class name" readonly style="background:#f8fafc;cursor:not-allowed">
          <div class="class-id-preview" id="classIdPreview">
            <i class="fas fa-info-circle"></i> <span id="previewText">Class ID will be generated automatically</span>
          </div>
        </div>
      </div>

      <div class="form-grid-3cols">
        <div class="form-group">
          <label><i class="fas fa-calendar-alt"></i> Session <span class="req">*</span></label>
          <input type="text" class="form-control" id="session" placeholder="e.g., 2024-2025, Spring 2025">
        </div>

        <div class="form-group">
          <label><i class="fas fa-layer-group"></i> Grade <span class="req">*</span></label>
          <select class="form-control" id="grade">
            <option value="">-- Select Grade --</option>
            <option value="Grade 1">Grade 1</option>
            <option value="Grade 2">Grade 2</option>
            <option value="Grade 3">Grade 3</option>
            <option value="Grade 4">Grade 4</option>
            <option value="Grade 5">Grade 5</option>
            <option value="Grade 6">Grade 6</option>
            <option value="Grade 7">Grade 7</option>
            <option value="Grade 8">Grade 8</option>
            <option value="Grade 9">Grade 9</option>
            <option value="Grade 10">Grade 10</option>
          </select>
        </div>

        <div class="form-group">
          <label><i class="fas fa-tags"></i> Section <span class="req">*</span></label>
          <input type="text" class="form-control" id="section" placeholder="e.g., A, B, C, D, Morning, Evening">
        </div>
      </div>

      <div class="form-grid-full">
        <div class="form-group">
          <label><i class="fas fa-align-left"></i> Description <span class="req">*</span></label>
          <textarea class="form-control" id="description" placeholder="Provide details about the make-up class (e.g., reason for make-up, topics to be covered, schedule notes)"></textarea>
        </div>
      </div>

      <div class="btn-actions">
        <a href="#" class="btn btn-primary" id="scheduleBtn">
          <i class="fas fa-save"></i> Schedule Make-Up Class
        </a>
        <a href="#" class="btn btn-secondary" id="resetBtn">
          <i class="fas fa-undo"></i> Reset
        </a>
        <a href="#" class="btn btn-secondary">
          <i class="fas fa-list"></i> View All Make-Up Classes
        </a>
        <a href="#" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>
  </div>
</main>
<script src="components.js"></script>
<script>
  // Load Header and Sidebar
    function loadComponents() {
      // Load Header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    // Initialize everything after components are loaded
    window.onload = function() {
      loadComponents();
      
      // Give time for HTML to load then initialize JS
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };
  // Auto-generated Class ID (Kept Functional)
  const classNameInput = document.getElementById('className');
  const classIdInput = document.getElementById('classId');
  const classIdPreview = document.getElementById('classIdPreview');
  const previewTextSpan = document.getElementById('previewText');

  function generateClassId(name) {
    if (!name || !name.trim()) return '';
    let base = name.trim().toUpperCase().replace(/[^A-Z0-9\s]/g, '');
    const words = base.split(/\s+/);
    let shortId = '';
    
    if (words.length === 1) {
      shortId = words[0].substring(0, 6);
    } else {
      const max = Math.min(words.length, 4);
      for (let i = 0; i < max; i++) {
        shortId += words[i].charAt(0);
      }
    }
    
    const randomNum = Math.floor(Math.random() * 900) + 100;
    return `MUC-${shortId}-${randomNum}`;
  }

  function updateClassId() {
    const name = classNameInput.value.trim();
    if (!name) {
      classIdInput.value = '';
      classIdPreview.classList.remove('show');
      return;
    }
    
    const id = generateClassId(name);
    classIdInput.value = id;
    previewTextSpan.innerHTML = `Class ID: <strong>${id}</strong> (auto-generated from "${name}")`;
    classIdPreview.classList.add('show');
  }

  // Reset Function
  function resetForm() {
    document.getElementById('className').value = '';
    document.getElementById('session').value = '';
    document.getElementById('grade').value = '';
    document.getElementById('section').value = '';
    document.getElementById('description').value = '';
    classIdInput.value = '';
    classIdPreview.classList.remove('show');
    classNameInput.focus();
  }

  // Real-time Auto ID Generation
  if (classNameInput) {
    classNameInput.addEventListener('input', updateClassId);
  }

  // Reset Button
  const resetBtn = document.getElementById('resetBtn');
  if (resetBtn) {
    resetBtn.addEventListener('click', (e) => {
      e.preventDefault();
      resetForm();
    });
  }
</script>
</body>
</html>
