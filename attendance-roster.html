<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS – Attendance Roster</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,Roboto,sans-serif}
body{background:#f8fafc;color:#1e293b;line-height:1.6}
.main-panel{flex:1;padding:40px 32px;background:#f8fafc;min-height:calc(100vh-70px)}
.page-header,.card{background:white;border-radius:16px;box-shadow:0 4px 25px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.page-header{padding:40px 36px;margin-bottom:32px}
.page-header h1{font-size:28px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.page-header p{font-size:16px;color:#475569}
.card{padding:40px;margin-bottom:28px}
.card-title{font-size:19px;font-weight:700;color:#1e293b;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #e5e7eb;display:flex;align-items:center;gap:12px}
.card-title i{color:#2563eb;font-size:22px}
.form-grid-5cols,.form-grid-4cols{display:grid;gap:24px}
.form-grid-5cols{grid-template-columns:repeat(5,1fr)}
.form-grid-4cols{grid-template-columns:repeat(4,1fr)}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:14.5px;font-weight:600;color:#334155;display:flex;align-items:center;gap:8px}
.req{color:#ef4444;margin-left:3px}
.form-control{padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15.2px;color:#1e293b;transition:all .25s;background:white;width:100%}
.form-control:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
.form-control:disabled{background:#f8fafc;color:#64748b;cursor:not-allowed}
select.form-control{cursor:pointer}
.date-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
.btn-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:40px;padding-top:28px;border-top:1px solid #e5e7eb}
.btn{padding:13px 28px;border:none;border-radius:10px;font-size:15.5px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:9px;text-decoration:none}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.3)}
.btn-secondary{background:#f8fafc;color:#334155;border:1.5px solid #e2e8f0}
.btn-secondary:hover{background:#f1f5f9;border-color:#cbd5e1}
@media(max-width:1200px){.form-grid-5cols{grid-template-columns:repeat(3,1fr)}.form-grid-4cols{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.main-panel,.page-header,.card{padding:24px 20px}
.form-grid-5cols,.form-grid-4cols,.date-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<main class="main-panel">
  <div class="page-header">
    <h1><i class="fas fa-clipboard-user" style="color:#2563eb;"></i> Attendance Roster</h1>
    <p>Select class and teacher to begin taking attendance</p>
  </div>

  <!-- Class Information -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-chalkboard"></i> Class Information
    </div>
    <div class="form-grid-5cols">
      <div class="form-group">
        <label><i class="fas fa-chalkboard-teacher"></i> Class Name <span class="req">*</span></label>
        <select class="form-control" id="classSelect" required onchange="fillClassDetails()">
          <option value="">-- Select Class --</option>
          <option value="Class A">Class A</option>
          <option value="Class B">Class B</option>
          <option value="Class C">Class C</option>
        </select>
      </div>
      <div class="form-group">
        <label><i class="fas fa-id-card"></i> Class ID</label>
        <input type="text" class="form-control" id="s_classId" disabled placeholder="Auto-generated">
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> Session</label>
        <input type="text" class="form-control" id="s_session" disabled placeholder="Session">
      </div>
      <div class="form-group">
        <label><i class="fas fa-layer-group"></i> Grade</label>
        <input type="text" class="form-control" id="s_grade" disabled placeholder="Grade">
      </div>
      <div class="form-group">
        <label><i class="fas fa-tags"></i> Section</label>
        <input type="text" class="form-control" id="s_section" disabled placeholder="Section">
      </div>
    </div>
  </div>

  <!-- Teacher Information -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-user-tie"></i> Teacher Information
    </div>
    <div class="form-grid-4cols">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Teacher Name <span class="req">*</span></label>
        <select class="form-control" id="teacherSelect" required onchange="fillTeacherDetails()">
          <option value="">-- Select Teacher --</option>
          <option value="Prof. Sarah Ahmed">Prof. Sarah Ahmed</option>
          <option value="Dr. Umar Farooq">Dr. Umar Farooq</option>
          <option value="Ms. Fatima Zafar">Ms. Fatima Zafar</option>
        </select>
      </div>
      <div class="form-group">
        <label><i class="fas fa-id-badge"></i> Teacher ID</label>
        <input type="text" class="form-control" id="teacherId" disabled placeholder="Auto-loaded">
      </div>
      <div class="form-group">
        <label><i class="fas fa-graduation-cap"></i> Qualification</label>
        <input type="text" class="form-control" id="teacherQualification" disabled placeholder="Qualification">
      </div>
      <div class="form-group">
        <label><i class="fas fa-book-open"></i> Subjects Can Teach</label>
        <input type="text" class="form-control" id="teacherSubjects" disabled placeholder="Subjects">
      </div>
    </div>
  </div>

  <!-- Attendance Details -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-calendar-check"></i> Attendance Details
    </div>
    
    <form id="attendanceForm">
      <div class="date-grid">
        <div class="form-group">
          <label><i class="fas fa-calendar-day"></i> Attendance Date <span class="req">*</span></label>
          <input type="date" class="form-control" id="attendanceDate" required>
        </div>
        <div></div>
      </div>

      <div class="btn-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-arrow-right"></i> Generate Roster
        </button>
        <button type="button" class="btn btn-secondary" id="resetBtn">
          <i class="fas fa-undo"></i> Reset
        </button>
        <a href="#" class="btn btn-secondary" id="viewAttendanceBtn">
          <i class="fas fa-eye"></i> View Attendance Details
        </a>
        <a href="#" class="btn btn-secondary" id="backDashboardBtn">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </form>
  </div>
</main>
<script src="components.js"></script>
<script>
  // Load Header and Sidebar
    function loadComponents() {
      // Load Header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    // Initialize everything after components are loaded
    window.onload = function() {
      loadComponents();
      
      // Give time for HTML to load then initialize JS
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };
// ==================== CLASS DATA ====================
const classData = {
  "Class A": {
    classId: "CA-2026-001",
    session: "2025-2026",
    grade: "Grade 5",
    section: "A"
  },
  "Class B": {
    classId: "CB-2026-002",
    session: "2025-2026",
    grade: "Grade 6",
    section: "B"
  },
  "Class C": {
    classId: "CC-2026-003",
    session: "2025-2026",
    grade: "Grade 7",
    section: "C"
  }
};

// ==================== TEACHER DATA ====================
const teacherData = {
  "Prof. Sarah Ahmed": {
    teacherId: "TCH-001",
    qualification: "M.Ed, PhD in Education",
    subjects: "Mathematics, Science"
  },
  "Dr. Umar Farooq": {
    teacherId: "TCH-002",
    qualification: "M.Sc Physics, B.Ed",
    subjects: "Physics, Chemistry"
  },
  "Ms. Fatima Zafar": {
    teacherId: "TCH-003",
    qualification: "MA English, B.Ed",
    subjects: "English, Urdu"
  }
};

// Fill Class Details
function fillClassDetails() {
  const className = document.getElementById('classSelect').value;
  const fields = {
    s_classId: document.getElementById('s_classId'),
    s_session: document.getElementById('s_session'),
    s_grade: document.getElementById('s_grade'),
    s_section: document.getElementById('s_section')
  };

  if (classData[className]) {
    fields.s_classId.value = classData[className].classId;
    fields.s_session.value = classData[className].session;
    fields.s_grade.value = classData[className].grade;
    fields.s_section.value = classData[className].section;
  } else {
    Object.values(fields).forEach(field => field.value = "");
  }
}

// Fill Teacher Details
function fillTeacherDetails() {
  const teacherName = document.getElementById('teacherSelect').value;
  const teacherIdField = document.getElementById('teacherId');
  const qualField = document.getElementById('teacherQualification');
  const subjectsField = document.getElementById('teacherSubjects');

  if (teacherData[teacherName]) {
    teacherIdField.value = teacherData[teacherName].teacherId;
    qualField.value = teacherData[teacherName].qualification;
    subjectsField.value = teacherData[teacherName].subjects;
  } else {
    teacherIdField.value = "";
    qualField.value = "";
    subjectsField.value = "";
  }
}

// Set default attendance date to today
const attendanceDate = document.getElementById('attendanceDate');
if (attendanceDate) {
  attendanceDate.value = new Date().toISOString().split('T')[0];
}

// Form submit prevention (only for the form)
document.getElementById('attendanceForm').addEventListener('submit', e => e.preventDefault());

</script>
</body>
</html>
