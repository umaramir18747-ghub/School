<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS – Merge Class</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,Roboto,sans-serif}
body{background:#f8fafc;color:#1e293b;line-height:1.6}
.main-panel{flex:1;padding:40px 32px;background:#f8fafc;min-height:calc(100vh-70px)}
.page-header,.card{background:white;border-radius:16px;box-shadow:0 4px 25px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.page-header{padding:40px 36px;margin-bottom:32px}
.page-header h1{font-size:28px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.page-header p{font-size:16px;color:#475569}
.card{padding:40px;margin-bottom:28px}
.card-title{font-size:19px;font-weight:700;color:#1e293b;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #e5e7eb;display:flex;align-items:center;gap:12px}
.card-title i{color:#2563eb;font-size:22px}
.form-grid-5cols{display:grid;grid-template-columns:repeat(5,1fr);gap:24px;margin-bottom:32px}
.form-grid-full{display:grid;grid-template-columns:1fr;gap:24px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:14.5px;font-weight:600;color:#334155;display:flex;align-items:center;gap:8px}
.req{color:#ef4444;margin-left:3px}
.form-control{padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15.2px;color:#1e293b;transition:all .25s;background:white;width:100%}
.form-control:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
.form-control:disabled{background:#f8fafc;color:#64748b;cursor:not-allowed}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:120px}
.section-title{font-size:16px;font-weight:600;color:#2563eb;margin-bottom:16px;display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1.5px dashed #e2e8f0}
.btn-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:40px;padding-top:28px;border-top:1px solid #e5e7eb}
.btn{padding:13px 28px;border:none;border-radius:10px;font-size:15.5px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:9px;text-decoration:none}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.3)}
.btn-secondary{background:#f8fafc;color:#334155;border:1.5px solid #e2e8f0}
.btn-secondary:hover{background:#f1f5f9;border-color:#cbd5e1}
@media(max-width:1200px){.form-grid-5cols{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.main-panel,.page-header,.card{padding:24px 20px}
.form-grid-5cols{grid-template-columns:1fr}}
</style>
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<main class="main-panel">
  <div class="page-header">
    <h1><i class="fas fa-code-branch" style="color:#2563eb;"></i> Merge Class</h1>
    <p>Merge a regular class with a make-up class</p>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fas fa-layer-group"></i> Merge Class Information
    </div>
    
    <form id="mergeClassForm">
      <div class="section-title"><i class="fas fa-school"></i> Original Class Information</div>
      <div class="form-grid-5cols">
        <div class="form-group">
          <label><i class="fas fa-chalkboard-teacher"></i> Class Name <span class="req">*</span></label>
          <select class="form-control" id="classSelect" required onchange="fillOriginalClass()">
            <option value="">-- Select Class --</option>
            <option value="Class A">Class A</option>
            <option value="Class B">Class B</option>
            <option value="Class C">Class C</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> Class ID</label>
          <input type="text" class="form-control" id="s_classId" disabled>
        </div>
        <div class="form-group">
          <label><i class="fas fa-calendar-alt"></i> Session</label>
          <input type="text" class="form-control" id="s_session" disabled>
        </div>
        <div class="form-group">
          <label><i class="fas fa-layer-group"></i> Grade</label>
          <input type="text" class="form-control" id="s_grade" disabled>
        </div>
        <div class="form-group">
          <label><i class="fas fa-tags"></i> Section</label>
          <input type="text" class="form-control" id="s_section" disabled>
        </div>
      </div>

      <div class="section-title"><i class="fas fa-calendar-plus"></i> Makeup Class Information</div>
      <div class="form-grid-5cols">
        <div class="form-group">
          <label><i class="fas fa-chalkboard-teacher"></i> Makeup Class Name <span class="req">*</span></label>
          <select class="form-control" id="makeupClassSelect" required onchange="fillMakeupClass()">
            <option value="">-- Select Makeup Class --</option>
            <option value="Class A">Class A</option>
            <option value="Class B">Class B</option>
            <option value="Class C">Class C</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> Class ID</label>
          <input type="text" class="form-control" id="m_classId" disabled>
        </div>
        <div class="form-group">
          <label><i class="fas fa-calendar-alt"></i> Session</label>
          <input type="text" class="form-control" id="m_session" disabled>
        </div>
        <div class="form-group">
          <label><i class="fas fa-layer-group"></i> Grade</label>
          <input type="text" class="form-control" id="m_grade" disabled>
        </div>
        <div class="form-group">
          <label><i class="fas fa-tags"></i> Section</label>
          <input type="text" class="form-control" id="m_section" disabled>
        </div>
      </div>

      <div class="form-grid-full">
        <div class="form-group">
          <label><i class="fas fa-align-left"></i> Description <span class="req">*</span></label>
          <textarea class="form-control" id="description" placeholder="Provide details about the class merge..." required></textarea>
        </div>
      </div>

      <div class="btn-actions">
        <button type="submit" class="btn btn-primary"><i class="fas fa-code-branch"></i> Merge Classes</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
        <a href="#" class="btn btn-secondary" id="viewMergesBtn"><i class="fas fa-eye"></i> View All Merges</a>
        <a href="#" class="btn btn-secondary" id="backDashboardBtn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      </div>
    </form>
  </div>
</main>
<script src="components.js"></script>
<script>
  // Load Header and Sidebar
    function loadComponents() {
      // Load Header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    // Initialize everything after components are loaded
    window.onload = function() {
      loadComponents();
      
      // Give time for HTML to load then initialize JS
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };
// Class Data
const classData = {
  "Class A": {
    classId: "CA-2026-001",
    session: "2025-2026",
    grade: "Grade 5",
    section: "A"
  },
  "Class B": {
    classId: "CB-2026-002",
    session: "2025-2026",
    grade: "Grade 6",
    section: "B"
  },
  "Class C": {
    classId: "CC-2026-003",
    session: "2025-2026",
    grade: "Grade 7",
    section: "C"
  }
};

// Fill Original Class Details
function fillOriginalClass() {
  const className = document.getElementById('classSelect').value;
  
  document.getElementById('s_classId').value = classData[className] ? classData[className].classId : "";
  document.getElementById('s_session').value = classData[className] ? classData[className].session : "";
  document.getElementById('s_grade').value = classData[className] ? classData[className].grade : "";
  document.getElementById('s_section').value = classData[className] ? classData[className].section : "";
}

// Fill Makeup Class Details
function fillMakeupClass() {
  const className = document.getElementById('makeupClassSelect').value;
  
  document.getElementById('m_classId').value = classData[className] ? classData[className].classId : "";
  document.getElementById('m_session').value = classData[className] ? classData[className].session : "";
  document.getElementById('m_grade').value = classData[className] ? classData[className].grade : "";
  document.getElementById('m_section').value = classData[className] ? classData[className].section : "";
}

</script>
</body>
</html>
