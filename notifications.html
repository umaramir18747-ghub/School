<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS – Send Notification</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="components.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,Roboto,sans-serif}
body{background:#f8fafc;color:#1e293b;line-height:1.6}
.main-panel{flex:1;padding:40px 32px;background:#f8fafc;min-height:calc(100vh-70px)}
.page-header,.card{background:white;border-radius:16px;box-shadow:0 4px 25px rgba(0,0,0,.07);border:1px solid #f1f5f9}
.page-header{padding:40px 36px;margin-bottom:32px}
.page-header h1{font-size:28px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.page-header p{font-size:16px;color:#475569}
.card{padding:40px;margin-bottom:28px}
.card-title{font-size:19px;font-weight:700;color:#1e293b;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #e5e7eb;display:flex;align-items:center;gap:12px}
.card-title i{color:#2563eb;font-size:22px}
.form-grid{display:grid;grid-template-columns:1fr;gap:28px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:14.5px;font-weight:600;color:#334155;display:flex;align-items:center;gap:8px}
.req{color:#ef4444;margin-left:3px}
.form-control{padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15.2px;color:#1e293b;transition:all .25s;background:white;width:100%}
.form-control:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
textarea.form-control{resize:vertical;min-height:120px}
.attachment-area{border:2px dashed #cbd5e1;border-radius:12px;padding:24px;background:#f8fafc;transition:all .25s;cursor:pointer;text-align:center}
.attachment-area:hover{border-color:#3b82f6;background:#f0f9ff}
.attachment-icon{font-size:48px;color:#94a3b8;margin-bottom:12px}
.file-info{display:none;align-items:center;justify-content:space-between;background:#f1f5f9;padding:12px 16px;border-radius:10px;margin-top:12px}
.file-info.show{display:flex}
.btn-remove-file{background:#fee2e2;color:#ef4444;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.image-preview{margin-top:12px;max-width:200px;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;display:none}
.image-preview.show{display:block}
.btn-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:40px;padding-top:28px;border-top:1px solid #e5e7eb}
.btn{padding:13px 28px;border:none;border-radius:10px;font-size:15.5px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:9px;text-decoration:none}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,235,.3)}
.btn-secondary{background:#f8fafc;color:#334155;border:1.5px solid #e2e8f0}
.btn-secondary:hover{background:#f1f5f9;border-color:#cbd5e1}
.error-message{color:#ef4444;font-size:13px;margin-top:5px;display:none}
.error-message.show{display:block}
</style>
</head>
<body>
  <!-- Header will be loaded here -->
  <div id="header-placeholder"></div>

  <div class="app-wrapper" id="appWrapper">
    
    <!-- Sidebar will be loaded here -->
    <div id="sidebar-placeholder"></div>

    <!-- Main Content -->
<main class="main-panel">
  <div class="page-header">
    <h1><i class="fas fa-bell"></i> Send Notification</h1>
    <p>Create and send announcements</p>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fas fa-envelope-open-text"></i> Notification Details
    </div>
    
    <form id="notificationForm">
      <div class="form-grid">
        <div class="form-group"><label><i class="fas fa-heading"></i> Notification Title <span class="req">*</span></label><input type="text" class="form-control" id="notificationTitle" placeholder="e.g., Holiday Announcement" required></div>
        <div class="form-group"><label><i class="fas fa-align-left"></i> Description <span class="req">*</span></label><textarea class="form-control" id="notificationDesc" placeholder="Write detailed description..." required></textarea></div>
        <div class="form-group">
          <label><i class="fas fa-paperclip"></i> Attachment <span style="font-weight:normal;color:#64748b">(PDF or Image)</span></label>
          <input type="file" id="attachmentInput" accept=".pdf,image/*" style="display:none">
          <div class="attachment-area" id="attachmentArea">
            <div class="attachment-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <p><strong>Click to upload</strong> or drag and drop</p>
            <p class="file-format-hint">PDF, JPG, PNG, GIF, WEBP (Max 10MB)</p>
          </div>
          <div class="file-info" id="fileInfo">
            <div class="file-details"><i class="fas fa-file-pdf" id="fileIcon"></i><span id="fileName">No file selected</span></div>
            <button type="button" class="btn-remove-file" id="removeFileBtn"><i class="fas fa-times"></i></button>
          </div>
          <div class="image-preview" id="imagePreview"><img id="previewImg" alt="Preview"></div>
        </div>
      </div>

      <div class="btn-actions">
        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Notification</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i> Reset</button>
        <a href="#" class="btn btn-secondary" id="viewNotificationsBtn"><i class="fas fa-bell"></i> View All Notifications</a>
        <a href="#" class="btn btn-secondary" id="backDashboardBtn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      </div>
    </form>
  </div>
</main>
<script src="components.js"></script>
<script>
  // Load Header and Sidebar
    function loadComponents() {
      // Load Header
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading sidebar:', err));
    }

    // Initialize everything after components are loaded
    window.onload = function() {
      loadComponents();
      
      // Give time for HTML to load then initialize JS
      setTimeout(() => {
        if (typeof window.initHeaderAndSidebar === 'function') {
          window.initHeaderAndSidebar();
        }
      }, 400);
    };
const form=document.getElementById('notificationForm');
const title=document.getElementById('notificationTitle');
const desc=document.getElementById('notificationDesc');
const fileInput=document.getElementById('attachmentInput');
const area=document.getElementById('attachmentArea');
const fileInfo=document.getElementById('fileInfo');
const fileNameSpan=document.getElementById('fileName');
const fileIcon=document.getElementById('fileIcon');
const removeBtn=document.getElementById('removeFileBtn');
const imgPreview=document.getElementById('imagePreview');
const previewImg=document.getElementById('previewImg');

let currentFile=null;

area.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(file){
    currentFile=file;
    fileNameSpan.textContent=file.name;
    fileInfo.classList.add('show');
    if(file.type.startsWith('image/')){
      fileIcon.className='fas fa-file-image';
      const reader=new FileReader();
      reader.onload=ev=>{previewImg.src=ev.target.result;imgPreview.classList.add('show')};
      reader.readAsDataURL(file);
    } else {
      fileIcon.className='fas fa-file-pdf';
      imgPreview.classList.remove('show');
    }
  }
});

removeBtn.addEventListener('click',()=>{
  fileInput.value='';
  currentFile=null;
  fileInfo.classList.remove('show');
  imgPreview.classList.remove('show');
});

form.addEventListener('submit',e=>{
  e.preventDefault();
  if(!title.value.trim()||!desc.value.trim()){
    alert("Title and Description are required!");
    return;
  }
  alert(`✅ Notification Sent!\n\nTitle: ${title.value}\nDescription: ${desc.value.substring(0,100)}...`);
  resetForm();
});

function resetForm(){
  form.reset();
  currentFile=null;
  fileInfo.classList.remove('show');
  imgPreview.classList.remove('show');
}

document.getElementById('viewNotificationsBtn').addEventListener('click',e=>{e.preventDefault();alert("Demo: No stored notifications.");});
document.getElementById('backDashboardBtn').addEventListener('click',e=>{e.preventDefault();alert("Back to Dashboard placeholder.");});
</script>
</body>
</html>
